body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯如是我聞一時薄伽梵住王舍城靈鷲山與大苾芻衆及大菩薩摩訶薩九十九俱胝衆俱爾時聖觀自在菩薩摩訶薩在彼衆會從座而起白佛言世尊我欲顯說普賢陀羅尼世尊此陀羅尼我於月上光如來所受得若菩薩乘者才聞此陀羅尼即得不退轉速疾承事一切如來應供正遍知者能銷滅一切業障獲得安樂富饒身得清淨語業清淨意得清淨通達一切大祕密海能滿一切大願海即見一切如來我由聞此陀羅尼便證無生法忍獲得首楞嚴三摩地證得寶印三摩地焰炬三摩地海印三摩地普遍虛空三摩地證得如是等恆河沙數三摩地門復證得開無盡篋等八萬四千陀羅尼門由此證得具慧具行得如是智慧成就所聞之法於諸佛所聞法無間承事供養唯願世尊許我為四部衆說佛言聽汝宣說爾時觀自在菩薩摩訶薩入金剛曼荼羅三摩地即說陀羅尼曰曩莫囉怛曩二合怛囉二合野耶一曩莫阿引哩耶二合嚩盧枳帝濕嚩二合囉引耶地薩怛嚩二合引野摩訶薩怛嚩二合引野三摩訶引迦引嚕抳迦引野怛儞也二合引他佉上誐吠佉上誐吠佉上我吠斫屈芻二合佉吠秫嚕二合怛囉二合佉吠伽囉二合引拏佉吠爾賀嚩二合引佉吠迦引野佉吠麼娜佉吠娑囉佉吠吠麼佉吠戍穰上佉吠儞弭多上佉吠鉢囉二合抳馱曩佉吠三摩引他佉吠播引囉弭多去引佉吠地佉吠娑囉娑囉娑囉薩嚩沒馱引地瑟恥二合帝婆囉婆囉婆囉達磨地瑟恥二合帝迦囉迦囉迦囉僧去伽引地瑟恥二合帝曩莫阿哩野二合嚩嚕枳帝濕嚩二合囉引野冒地薩怛嚩二合野摩訶薩怛嚩二合野摩訶迦嚕抳迦引野曩慕捺嚩二合曩嚩底丁以反引南冒引地薩怛嚩二合句引胝引南引阿地瑟恥二合帝覩𤚥引阿引聿㗚麼二合懶者娜難上覩怛儞也二合他蘇囉鼻蘇囉鼻母儞母儞摩訶母儞麼底麼底摩訶麼底曩莫阿引哩野二合引嚩盧枳帝濕嚩二合囉引野冒地薩怛嚩二合引野摩訶引薩怛嚩二合引野摩訶引迦引嚕抳迦引野悉殿覩三滿多跋捺囉二合馱引囉抳娑嚩二合引訶引爾時觀自在菩薩說此陀羅尼時九十二俱胝菩薩證得首楞嚴三摩地恆河沙數菩薩證得微妙陀羅尼三摩地我今說此陀羅尼功德每於晨朝誦此陀羅尼一百八遍滿二十一日觀自在菩薩即現其身所求一切願皆得滿足若人囚禁枷鎖七日誦持即得解脫若人患瘧於左耳邊誦患者即愈若人患風邪魅病酥油相和加持二十一遍令服即得除差若患齒痛加持齒木二十一遍令嚼即愈若患耳痛取疊花子油並置於熟銅器中加持七遍滴於耳中即愈若患頭痛肚痛加持手摩捫即愈若患鬼魅結呪索加持一百八遍令帶即愈若被拏吉儞魅加持油七遍摩塗支節即愈若患一切病加持或手或柳枝摩拂即愈如上諸法即未置功業隨誦即效若欲求見佛菩薩證陀羅尼門三摩地門神通隱形安膳那藥雄黃成就者行者於舍利塔或佛像前塗拭曼荼羅懸繒幡蓋散種種花燒檀香沈香薰陸香燃燈一百盞廣大供養念誦者清淨澡浴著淨衣服身持梵行即誦此陀羅尼結方隅界陀羅尼曰曩謨囉怛曩二合怛囉二合引野耶曩莫阿引哩野二合引嚩盧枳帝濕嚩二合囉引野地薩怛嚩二合野摩訶薩怛嚩二合野摩訶迦嚕抳迦引野怛儞也二合他止里滿馱引銘上弭里滿馱引弭止里弭里滿馱引弭枲引摩滿馱引弭枲引摩引銘羯室旨二合娜底訖囉二合麼覩娑嚩二合引訶引以此陀羅尼加持水二十一遍於道場中散灑十方即成結界我今說迎請陀羅尼真言行者先誦此陀羅尼迎請已然後念誦陀羅尼曰曩謨囉怛曩二合怛囉二合野引耶曩莫阿引哩野二合引嚩嚧枳帝濕嚩二合囉引野地薩怛嚩二合引野摩訶引薩怛嚩二合引野摩訶迦引嚕抳迦引野怛儞也二合他止里止里弭里弭里止里隸引翳呬婆誐挽曩引哩野二引合嚩盧枳帝濕嚩二合囉娑嚩二合訶引此陀羅尼是我心真言誦真言即成請召行者從白月八日起首乃至十五日日三時時別誦一百八遍三時澡浴三時換衣其十五日作廣大供養無限念誦其日中夜觀自在菩薩來至道場現金色身相好端嚴放百千光明持誦者不應恐怖生勇健心才見觀自在菩薩即得地位證得陀羅尼三摩地即見東方阿閦如來南方寶幢如來西方無量壽如來北方天鼓音王如來見四如來十方無量如來身廣大威德承於諸佛大悲願力久住世間從此命終當生淨妙佛剎於一切處供養承事諸佛如來爾時世尊說是經已菩薩摩訶薩并天龍藥叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等皆大歡喜信受奉行􅑈􅝪􅁰􅞣􅝪􅝝􅝪􅁥
